<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Gestión de Inmuebles</title></head>
<body>
    <h2>Buscar disponibilidad</h2>
    <form action="/buscar" method="get">
        Inicio: <input type="date" name="fechaInicio" th:value="${fechaInicio}" required/>
        Fin: <input type="date" name="fechaFin" th:value="${fechaFin}" required/>
        <button type="submit">Filtrar</button>
        <a href="/listarInmuebles">Ver todos</a>
    </form>
    <hr/>
    <h2>Añadir nuevo inmueble</h2>
    <p th:if="${error}" th:text="${error}" style="color:red; font-weight:bold;"></p>
    <form action="/guardarInmueble" method="post">
        <input type="text" name="direccion" placeholder="Dirección" required/>
        <input type="number" step="0.01" name="precio" placeholder="Precio" required/>
        <input type="text" name="descripcion" placeholder="Descripción" required/>
        <br>
        Disponibilidad inicial: <input type="date" name="fechaInicio" required/> a <input type="date" name="fechaFin" required/>
        <button type="submit">Guardar</button>
    </form>
    <hr/>
    <h2>Inmuebles Disponibles</h2>
    <table border="1">
        <thead><tr><th>Dirección</th><th>Precio</th><th>Descripción</th></tr></thead>
        <tbody>
            <tr th:each="inmueble : ${lista}">
                <td th:text="${inmueble.direccion}"></td>
                <td th:text="${inmueble.precio}"></td>
                <td th:text="${inmueble.descripcion}"></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
