<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro de Inquilino</title>
</head>
<body>
    <h2>Registro de Inquilino</h2>

    <div th:if="${param.error}" style="color: red; font-weight: bold;">
        Error: El login ya existe o los datos son incorrectos.
    </div>

    <form action="/registroInquilino" method="post">
        <label>Login:</label>
        <input type="text" name="login" required /><br><br>
        
        <label>Contraseña:</label>
        <input type="password" name="pass" required /><br><br>

        <label>Nombre:</label>
        <input type="text" name="nombre" required /><br><br>

        <label>Apellidos:</label>
        <input type="text" name="apellidos" required /><br><br>

        <label>Dirección:</label>
        <input type="text" name="direccion" required /><br><br>
        
        <button type="submit">Registrarme</button>
    </form>
    
    <br/>
    <a href="/login">Ya tengo cuenta (Ir al Login)</a>
</body>
</html>
