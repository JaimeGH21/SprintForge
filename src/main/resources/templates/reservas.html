<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <h1>Mis Reservas</h1>

    <form action="/reservas" method="POST">
        <input type="text" name="descripcion" placeholder="Descripción de la reserva" required>
        <button type="submit">Guardar Reserva</button>
    </form>

    <h2>Listado:</h2>
    <ul>
        <li th:each="r : ${reservas}" th:text="${r.descripcion}"></li>
    </ul>
    
    <a href="/login">Volver</a>
</body>
</html>
